name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install backend tooling and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Stamp service worker cache version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          sed -i "s/aurion-v[^\"']*/aurion-${SHORT_SHA}/" frontend/sw.js

      - name: Lint backend
        run: python -m ruff check backend tests

      - name: Type check backend
        run: python -m mypy backend

      - name: Check formatting
        run: python -m ruff format --check backend tests

      - name: Run backend tests with coverage
        run: >
          python -m pytest
          tests/test_api.py
          tests/test_config.py
          tests/test_market_data.py
          tests/test_ml_pipeline.py
          tests/test_prediction_service.py
          tests/test_rate_limit.py
          tests/test_smoke_integration.py
          tests/test_exchange_rates.py
          --cov=backend
          --cov-report=term-missing
          -q

      - name: Audit backend dependencies
        run: python -m pip_audit -r backend/requirements.txt
