name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install backend tooling and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Stamp service worker cache version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          sed -i "s/aurion-v[^\"']*/aurion-${SHORT_SHA}/" frontend/sw.js

      - name: Lint backend
        run: python -m ruff check backend tests

      - name: Type check backend
        run: python -m mypy backend

      - name: Check formatting
        run: python -m ruff format --check backend tests

      - name: Type check mobile
        working-directory: mobile
        run: npm run typecheck

      - name: Run backend tests with coverage
        run: >
          python -m pytest
          tests
          --ignore=tests/test_frontend_smoke.py
          --cov=backend
          --cov-report=term-missing
          -q

      - name: Run frontend smoke test
        run: python -m pytest tests/test_frontend_smoke.py -q

      - name: Audit backend dependencies
        run: python -m pip_audit -r backend/requirements.txt
