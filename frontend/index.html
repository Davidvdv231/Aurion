<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b172a" />
    <title>Stock Predictor</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="stylesheet" href="/styles.css" />
    <script src="/vendor/chart.umd.min.js" defer></script>
    <script src="/app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="card controls-card">
        <h1>Stock & Crypto Predictor</h1>
        <p class="subtitle">1-maands voorspelling voor aandelen en crypto (telefoon + pc)</p>

        <form id="predict-form" class="form-grid">
          <label>
            Markt
            <select id="asset-type" name="asset_type">
              <option value="stock">Aandelen</option>
              <option value="crypto">Crypto</option>
            </select>
          </label>

          <label>
            Voorspellingsengine
            <select id="engine" name="engine">
              <option value="stat">Statistisch model</option>
              <option value="ai">AI model (OpenAI)</option>
            </select>
          </label>

          <label>
            Ticker symbool
            <div class="autocomplete-wrap">
              <input
                id="symbol"
                name="symbol"
                type="text"
                value="AAPL"
                maxlength="20"
                autocomplete="off"
                required
              />
              <ul id="ticker-suggestions" class="suggestions" hidden></ul>
            </div>
            <span id="symbol-help" class="field-help">Aandelen: AAPL, INGA, KBC | Crypto: BTC, ETH, SOL</span>
          </label>

          <label>
            Horizon (dagen)
            <input id="horizon" name="horizon" type="number" min="7" max="45" value="30" required />
          </label>

          <button id="submit-btn" type="submit">Toon voorspelling</button>
        </form>

        <section class="top-picks">
          <h2 id="top-title">Top 10 Aandelen Nu</h2>
          <p class="field-help">Klik op een ticker om meteen de voorspelling te laden.</p>
          <div id="top-assets" class="chip-grid" aria-live="polite"></div>
        </section>

        <p id="status" class="status" role="status" aria-live="polite"></p>
      </section>

      <section class="card stats-card" id="stats-card" hidden>
        <h2>Samenvatting</h2>
        <div class="stats-grid">
          <article>
            <h3>Laatste koers</h3>
            <p id="last-close">-</p>
          </article>
          <article>
            <h3>Dagelijkse trend</h3>
            <p id="trend">-</p>
          </article>
          <article>
            <h3>Model</h3>
            <p id="model-name">-</p>
          </article>
        </div>
        <div class="meta-row">
          <p id="source-badge" class="badge" hidden>Bronnen: -</p>
          <p id="degraded-badge" class="badge badge--warning" hidden>Fallback actief</p>
        </div>
        <p id="disclaimer" class="disclaimer"></p>
      </section>

      <section class="card chart-card">
        <p id="chart-fallback" class="chart-fallback" hidden></p>
        <canvas id="stock-chart" aria-label="Asset prediction chart"></canvas>
      </section>
    </main>
  </body>
</html>
