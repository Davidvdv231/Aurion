apiVersion: apps/v1
kind: Deployment
metadata:
  name: aurion-api
  namespace: aurion
  labels:
    app: aurion-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aurion-api
  template:
    metadata:
      labels:
        app: aurion-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: aurion-api
          image: aurion-api:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: aurion-config
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: aurion-secrets
                  key: REDIS_URL
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
