apiVersion: apps/v1
kind: Deployment
metadata:
  name: aurion-redis
  namespace: aurion
  labels:
    app: aurion-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aurion-redis
  template:
    metadata:
      labels:
        app: aurion-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
          ports:
            - containerPort: 6379
              protocol: TCP
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 192Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: aurion-redis
  namespace: aurion
  labels:
    app: aurion-redis
spec:
  type: ClusterIP
  selector:
    app: aurion-redis
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
