version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    env_file:
      - ../.env
    environment:
      REDIS_URL: redis://redis:6379/0
      ARTIFACTS_ROOT: /app/artifacts
    ports:
      - "8000:8000"
    volumes:
      - ../artifacts:/app/artifacts
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stock_predictor
      POSTGRES_USER: stock_predictor
      POSTGRES_PASSWORD: stock_predictor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
